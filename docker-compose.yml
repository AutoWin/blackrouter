services:
  blackrouter:
    build:
      context: .
      dockerfile: Dockerfile
    image: blackrouter:local
    container_name: blackrouter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BLACKROUTER_HOST: 0.0.0.0
      BLACKROUTER_PORT: 20129
      BLACKROUTER_DATA_DIR: /data
      BLACKROUTER_DATABASE_URL: sqlite:///data/blackrouter.db
      BLACKROUTER_COMPAT_9ROUTER_DB: "false"
    ports:
      - "${BLACKROUTER_PORT:-20129}:20129"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:20129/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
  redis:
    image: redis:7-alpine
    container_name: blackrouter-redis
    profiles: ["cluster"]
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
  prometheus:
    image: prom/prometheus:latest
    container_name: blackrouter-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
  grafana:
    image: grafana/grafana:latest
    container_name: blackrouter-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  redis-data:
