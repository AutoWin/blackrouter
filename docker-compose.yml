services:
  blackrouter:
    build:
      context: .
      dockerfile: Dockerfile
    image: blackrouter:local
    container_name: blackrouter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BLACKROUTER_HOST: 0.0.0.0
      BLACKROUTER_PORT: ${BLACKROUTER_PORT:-20129}
      BLACKROUTER_DATA_DIR: /data
      BLACKROUTER_DATABASE_URL: sqlite:///data/blackrouter.db
      BLACKROUTER_COMPAT_9ROUTER_DB: "false"
    ports:
      - "${BLACKROUTER_PORT:-20129}:${BLACKROUTER_PORT:-20129}"
    volumes:
      - ./data:/data
